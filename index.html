<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon's OKR Tracker 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Now Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #F9F9F6;
      color: #000;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid #CCCCCC;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    .header-brand { display: flex; align-items: center; gap: 12px; }

    .header-logo { height: 26px; width: auto; display: block; }

    .header-divider { width: 1px; height: 18px; background: #CCCCCC; }

    .header-page-label {
      font-size: 10px; font-weight: normal;
      letter-spacing: 0.12em; text-transform: uppercase; color: #595959;
    }

    /* ─── LAYOUT ─────────────────────────────────────────────── */
    main {
      max-width: 960px; margin: 0 auto;
      padding: 48px 24px; display: flex;
      flex-direction: column; gap: 24px;
    }

    /* ─── OBJECTIVE CARD ─────────────────────────────────────── */
    .objective-card {
      background: #fff;
      border: 1px solid #CCCCCC;
      overflow: hidden;
    }

    .objective-header {
      padding: 24px 32px;
      border-bottom: 1px solid #CCCCCC;
      display: flex; align-items: baseline; gap: 18px;
    }

    .objective-number {
      font-size: 9px; font-weight: 400; color: #000;
      letter-spacing: 0.1em; flex-shrink: 0;
      background: #CCCCCC; padding: 3px 8px;
      text-transform: uppercase;
    }

    .objective-title {
      font-family: "Helvetica Now Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 18px; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      line-height: 1.1; flex: 1; color: #000;
    }

    /* ─── KR LIST ────────────────────────────────────────────── */
    .kr-list { display: flex; flex-direction: column; }

    .kr-item { padding: 24px 32px; border-bottom: 1px solid #F9F9F6; }
    .kr-item:last-child { border-bottom: none; }

    .kr-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

    .kr-id {
      font-size: 9px; font-weight: 400; color: #fff;
      letter-spacing: 0.08em; flex-shrink: 0;
      background: #5E6B52; padding: 3px 8px;
      text-transform: uppercase; white-space: nowrap;
    }

    .kr-title { font-size: 14px; font-weight: 400; flex: 1; color: #000; line-height: 1.35; }

    .kr-description { font-size: 13px; color: #595959; line-height: 1.65; margin-bottom: 16px; }

    .kr-metrics { margin: 8px 0 16px 14px; }
    .kr-metrics li { font-size: 12px; color: #595959; line-height: 1.7; list-style: disc; }

    /* ─── TIERS ──────────────────────────────────────────────── */
    .tiers {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0; border: 1px solid #CCCCCC; margin-top: 4px;
    }

    .tier { padding: 14px 16px; border-left: 3px solid transparent; }
    .tier + .tier { border-top: none; }
    .tier.solid      { background: #F9F9F6; border-left-color: #CCCCCC; }
    .tier.impressive { background: #EBEBEB; border-left-color: #595959; }
    .tier.excellent  { background: #EEF2EB; border-left-color: #5E6B52; }

    .tier-label {
      font-size: 9px; font-weight: 400; text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 7px; color: #595959;
    }
    .tier.excellent .tier-label { color: #5E6B52; }

    .tier-text { font-size: 12px; line-height: 1.6; color: #000; }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .header-divider, .header-page-label { display: none; }
      main { padding: 24px 12px; }
      .objective-header, .kr-item { padding: 18px 16px; }
      .tiers { grid-template-columns: 1fr; }
      .tier + .tier { border-top: 1px solid #CCCCCC; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-brand">
      <img class="header-logo" src="brandassets/ARC_Bird_K.png" alt="Arc'teryx">
    </div>
    <div class="header-divider"></div>
    <span class="header-page-label">Simon Cheng &nbsp;</span>
    <div class="header-divider"></div>
    <span class="header-page-label">&nbsp; Objectives & Key Results for 2026</span>
  </div>
</header>

<main id="app"></main>

<script>
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(data) {
    const app = document.getElementById('app');
    app.innerHTML = '';

    data.objectives.forEach(obj => {
      const card = document.createElement('div');
      card.className = 'objective-card';

      const hdr = document.createElement('div');
      hdr.className = 'objective-header';
      hdr.innerHTML = `
        <div class="objective-number">${String(obj.id).padStart(2,'0')}</div>
        <div class="objective-title">${escHtml(obj.title)}</div>
      `;
      card.appendChild(hdr);

      const krList = document.createElement('div');
      krList.className = 'kr-list';

      obj.keyResults.forEach(kr => {
        const item = document.createElement('div');
        item.className = 'kr-item';

        const metricsHtml = kr.metrics && kr.metrics.length
          ? `<ul class="kr-metrics">${kr.metrics.map(m => `<li>${escHtml(m)}</li>`).join('')}</ul>`
          : '';

        item.innerHTML = `
          <div class="kr-header">
            <span class="kr-id">${escHtml(kr.id)}</span>
            <span class="kr-title">${escHtml(kr.title)}</span>
          </div>
          <p class="kr-description">${escHtml(kr.description)}</p>
          ${metricsHtml}
          <div class="tiers">
            <div class="tier solid">
              <div class="tier-label">Solid</div>
              <div class="tier-text">${escHtml(kr.tiers.solid)}</div>
            </div>
            <div class="tier impressive">
              <div class="tier-label">Impressive</div>
              <div class="tier-text">${escHtml(kr.tiers.impressive)}</div>
            </div>
            <div class="tier excellent">
              <div class="tier-label">Excellent</div>
              <div class="tier-text">${escHtml(kr.tiers.excellent)}</div>
            </div>
          </div>
        `;

        krList.appendChild(item);
      });

      card.appendChild(krList);
      app.appendChild(card);
    });
  }

  fetch('data.json')
    .then(r => r.json())
    .then(render);
</script>
</body>
</html>
